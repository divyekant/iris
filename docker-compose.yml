services:
  iris:
    build: .
    ports:
      - "127.0.0.1:${PORT:-3000}:3000"
    volumes:
      - iris-data:/app/data
    environment:
      - DATABASE_URL=/app/data/iris.db
      - OLLAMA_URL=http://ollama:11434
      - MEMORIES_URL=http://host.docker.internal:8900
      - PORT=3000
      - BIND_ALL=1  # Required inside container; host binding is restricted by ports: above
    env_file:
      - path: .env
        required: false
    # depends_on:
    #   ollama:
    #     condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  ollama:
    image: ollama/ollama:0.9
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped

volumes:
  iris-data:
  ollama-data:
